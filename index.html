<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <title>Siddepladser</title>
  <style>
    body {
      background: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 30px;
    }

    h1 {
      margin-bottom: 25px;
      letter-spacing: 4px;
      border: 1px solid #333;
      padding: 16px 40px;
      font-size: 20px;
    }

    .container {
      display: grid;
      grid-template-rows: repeat(5, auto);
      gap: 20px;
    }

    .row {
      display: grid;
      gap: 15px;
      justify-content: center;
    }

    .row-5 { grid-template-columns: repeat(5, 120px); }
    .row-4 { grid-template-columns: repeat(4, 120px); }
    .row-3 { grid-template-columns: repeat(3, 120px); }

    .seat {
      border: 1px solid #333;
      padding: 18px;
      text-align: center;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h1>TAVLE</h1>

<div class="container" id="seating"></div>

<script>
  const names = [
    "Anton","Celina","Ella B.","Ella E.","Elliot","Enzo",
    "Freja","Freya","Ida-Marie","Johannes","Kira","Konrad",
    "Lili","Lyon","Margrethe","Nanna","Nicoline","Nohr",
    "Roberta","Sander","Walter"
  ];

  // Dato bruges som seed – skifter automatisk ved midnat (lokal/dansk tid)
  function getDailySeed() {
    const now = new Date();
    return now.toISOString().slice(0, 10).replace(/-/g, "");
  }

  function shuffle(array, seed) {
    let m = array.length, t, i;

    function random() {
      seed = (seed * 9301 + 49297) % 233280;
      return seed / 233280;
    }

    while (m) {
      i = Math.floor(random() * m--);
      t = array[m];
      array[m] = array[i];
      array[i] = t;
    }
    return array;
  }

  const seed = parseInt(getDailySeed());
  const shuffled = shuffle([...names], seed);

  const layout = [5, 5, 5, 4, 3];
  const container = document.getElementById("seating");

  let index = 0;

  layout.forEach((size, rowIndex) => {
    const row = document.createElement("div");
    row.className = "row row-" + size;

    for (let i = 0; i < size; i++) {
      const seat = document.createElement("div");
      seat.className = "seat";

      // Fast plads: Sarah i række 1, plads 5
      if (rowIndex === 0 && i === 4) {
        seat.textContent = "Sarah";
      } else {
        seat.textContent = shuffled[index++];
      }

      row.appendChild(seat);
    }
    container.appendChild(row);
  });
</script>

</body>
</html>
